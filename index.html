<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <title>科技日子倒數計時器 + 時間軸</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Orbitron', monospace; min-height: 100vh; background: linear-gradient(45deg, #0a0a23, #1a0033, #0f0f4f, #2a0a4a); background-size: 400% 400%; animation: cyberGradient 20s ease infinite;
            position: relative; overflow-x: auto; padding: 20px 0;
        }
        @keyframes cyberGradient { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        body::before {
            content: ''; position: fixed; top: 0; left: -100%; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, #00ffff, transparent); animation: scan 3s infinite;
        }
        @keyframes scan { 0% { left: -100%; } 100% { left: 100%; } }
        .main-container {
            display: flex; max-width: 1400px; margin: 0 auto; gap: 2rem; align-items: flex-start;
        }
        .timeline {
            flex: 0 0 80px; height: 600px; position: sticky; top: 20px; background: rgba(0,0,0,0.5); border-radius: 10px; padding: 1rem; border: 1px solid #00ffff; box-shadow: 0 0 20px rgba(0,255,255,0.2);
        }
        .timeline-labels {
            display: flex; flex-direction: column; height: 100%; justify-content: space-between; color: #888; font-size: 0.8rem; text-align: center;
        }
        .timeline-bar {
            width: 20px; height: 100%; margin: 0 auto; background: linear-gradient(to top, rgba(0,255,255,0.1) 0%, transparent 100%); border-radius: 10px; position: relative; border: 1px solid rgba(0,255,255,0.3);
        }
        .progress-fill {
            position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, #00ffff, #0099cc); border-radius: 10px; transition: height 1s ease; box-shadow: 0 0 15px #00ffff;
        }
        .target-marker {
            position: absolute; width: 100%; height: 2px; background: #ff00ff; top: 0; left: 0; box-shadow: 0 0 10px #ff00ff; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .target-label { color: #ff00ff; font-size: 0.7rem; margin-top: 0.5rem; font-weight: 700; }
        .timer-container {
            flex: 1; text-align: center; position: relative; padding: 3rem 2rem; border-radius: 15px; background: rgba(0,0,0,0.7); border: 2px solid #00ffff; 
            box-shadow: 0 0 50px rgba(0,255,255,0.3), inset 0 0 50px rgba(0,255,255,0.1); backdrop-filter: blur(15px); max-width: 800px;
        }
